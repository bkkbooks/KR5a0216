front:
  text: 地府十王拔度儀為八
  hash: sha256:6944e4c50f559c856ed93da60c1db0d663449464620a1b4b325c56d4dac559bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0216_HFL_000-001a, image: hfl/0084/0084-084.png}
body:
  text: 法事普獻無邊聖香煙散大羅諸天無量聖日月斗星辰玄師經籙祖天府衆髙真願垂大慈力超度此亡靈和不可思議功德普獻無邊聖香煙透冥關酆都岱嶽府考校罪魂司幽牢遍諸獄地府衆威靈願垂大慈力超度此亡靈和不可思議功德普獻無邊聖香煙遍榑桑江河淮海濟雷電雨龍神十洲三島谷水府衆仙真願垂大慈力超度此亡靈和不可思議功德啓聖入科伏以天髙地下布品彚以昭彰日往月來成四時之代謝有生必盡無始不終覩山澤之難藏知形數之不免皇天有監造物無私生雖貴賤之殊死無髙下之間人生一世幻化非堅假合形軀強成四體似枕前之春夢如石中之火光似猛風之徹燭如水上之浮漚變滅須臾之間成壤俄頃之際形歸於地魄返諸幽惟彼至人超於妙外行乎萬人之上坐閲古人之徒千載歸來嘆城郭之猶是一朝頓悟雖宇宙之難籠苟非自得其方難免同歸於土今齋官某伏為亡過某恐緣在世之時身有無邊之罪歸依真教大啓琅函恭對髙真稱揚聖號大聖三寶天尊爾時元始天尊在西那玉國鬱絶之山長樂宫中黃金殿內與太上道君演教世界衆生死經十大地獄因緣罪福報對無休敕妙行真人承此光明下入九幽普拔亡靈悉令超度以今懴悔説此善緣各啓虔誠同聲讃詠信禮無上大羅天三清三境三寶天尊三尊聖號功德無邊可以超度亡靈可以保扶見在今亡過某追修冥路早遂超升先請五分冥香供養三清上聖降臨道場次請大德法師行持法事仰憑法衆齊聲讃嘆大不可思議道香德香無為香解脫香自然微妙返生香香冉冉珮玲玲唯聞法師讃嘆聲寶藴一開天地靜逡巡早見異光生一炷冥香爇返魂望空供養玉晨尊願降大慈無礙力使令亡者早超升和不可思議功德焚香仰啓法中王清微天中為聖主生天生地生人物髙上玉清元始尊和不可思議功德焚香仰啓法中王禹餘天中為教主傳經傳教傳萬法髙上玉晨大道君和不可思議功德焚香仰啓法中王太赤天中為化主造化三才運五行髙上五靈玄老君和不可思議功德爾時元始天尊告妙行真人曰北方溟海之外十萬餘里有一世界名曰洞隂朔單鬱絶之國中有一帝君號曰五靈玄老黑帝天君統領北鄉無鞅聖衆有一大山號曰酆都山上接閬風之臺周回五萬餘里下有六洞謂之曰隂景天宫即太溟水帝北隂天君酆都大帝之所治也諸天直使五斗靈君東斗生氣君南斗司禁君西斗生形君北斗司命君中斗總録君九合土主五嶽大神以為僚屬分司佐治十位真君諸大地獄校量善惡拷掠魂神應是亡殁之人遍須經詣是時坐中有一真人名曰妙行瞻依天尊作諸是頌拔度亡人今日敷揚用伸懴念太一救苦天尊焚香供養冥府第一宫泰素妙廣真君世人所謂秦廣大王其中地獄長蛇吐焰鐵狗噴煙亡人一七先到此宫天尊哀憫救度亡魂出離冥塗乃稱偈讃玉寶皇上天尊茫茫苦海實堪哀惡業於身手自栽魂魄巳歸司命府幽關鎖閉幾時開長蛇吐焰炎如火鐵狗噴煙陳陳來稽首諦聽三寶頌普令超度出泉臺和不可思議功德爾時真人聞是頌巳歡喜踴躍仰謝天尊再稱偈讃九幽拔罪天尊無邊聖力不思議盡釋幽牢拷對詞一道祥光來接引亡靈隨逐上丹墀和願薦此亡靈往生極樂國焚香供養冥府第二宫隂德定休真君見世名曰初江大王其中地獄刀山劒樹火翳寒冰亡人二七須詣此宫天尊哀憫拔度亡魂出離冥塗乃稱偈讃玄真萬福天尊衆生成造惡因緣孰為回心見福田劒樹刀山屠一體湯隨烈火恣烹煎無明種種欺方寸一念思惟秪罪愆汝等歸依無上道當來速得往生天和不可思議功德爾時真人聞是頌巳心大歡喜稽首天尊再吟偈讃十方救苦天尊悠悠長夜可悲傷一切衆生苦莫當仰賴慈尊垂救度須臾熱惱化清涼和願薦此亡靈往生極樂國焚香供養冥府第三宫洞明普靜真君世人所謂宋帝大王其中地獄吞火食毒屠割身形亡人三七須詣此宫天尊大慈不令經涉乃作偈頌太妙至極天尊冥冥幽府九重根長夜唯聞苦毒聲獄卒強教吞毒炭牛頭屠割汝形身前生業果重重積殁後悲酸一一經今日聽宣無上道此身速離廣寒庭和不可思議功德爾時真人聞是頌巳説大慈心讃嘆天尊而作偈頌朱陵度命天尊天尊説教大慈悲惡業衆生盡得離五色祥光開道路從今同會入無為和願薦此亡靈往生極樂國焚香供養第四宫玄德五靈真君世人所謂仵官大王其中地獄負沙運石無有休息亡人四七須詣此宫天尊大慈廣垂哀憫救度衆生而作偈頌玄上玉晨天尊酆都六洞大冥鄉窈窕窮魂實可傷惡業沉魂歸地府善功圎滿上天堂負沙運石無休息滚滚長河似沸湯諦聽慈悲無上語今為甘露入飢腸和不可思議功德爾時真人聞是頌巳稽首天尊讃嘆無量再吟偈頌法橋大度天尊天尊無量救衆生白簡丹書地獄迎一切愆尤俱解釋從今拷掠頓超升和不可思議功德焚香供養冥府第五宫最聖耀靈真君世人所謂閻羅大王乃北隂天君之上佐諸大地獄之總司號同九幽位齊五斗亡人五七當至此宫業鏡現形隨緣報對天尊慈憫普為衆生拔度亡魂而作偈頌度仙上聖天尊衆生顚倒昧元因欲海茫茫錯用心金玉如山難濟死臨行惟有業隨身三塗渺渺無超度長夜冥冥正拷魂地獄須臾皆解脫一心恭敬大慈尊和不可思議功德爾時真人聞是慈悲稽首作禮上白天尊再吟偈頌火錬丹界天尊衆生業障本由心解脫須憑無量因稽首虛皇無上道一言寶偈勝千金和願薦此亡靈往生極樂國焚香供養冥府第六宫寶肅昭成真君世人所謂變成大王其中地獄金釘拔舌鐵斧刳胸亡人六七當詣此宫晝夜拷魂被受諸苦天尊慈憫奉為一切窮魂而作偈頌好生度命天尊刀山劒樹鐵成林惡業衆生正苦吟浮世電光來快樂冥塗千劫永湮沉隂司報對無容隱拔舌刳胸痛莫禁為汝滅除無量業當來稽首謝三清和不可思議功德爾時真人聞是頌巳頂禮恭敬上白天尊再吟偈頌金闕化身天尊慈尊惠度説因緣接引衆生上法船錬度此形成妙質當知聖力大無邊和願薦此亡靈往生極樂國焚香供養冥府第七宫泰山玄妙真君見世名曰泰山大王受上帝敕命佐理北隂晝居東嶽夜入冥府亡人終七須詣此宫拷定因緣校量罪福天尊救度普使超升為諸衆生而作偈頌太靈虛皇天尊人間禍福本無門汝等親栽善惡根方寸但知藏垢穢百年數盡作孤魂業風吹處生還死萬劫悲辛不忍聞為汝滅除無量業當來來敬大元君和不可思議功德爾時真人聞是妙音發無上道心稽首天尊再吟偈頌逍遙快樂天尊悠悠五苦報囚徒髙上慈尊盡拔扶倐忽遍蒙甘露灑幽關無數出泥塗和願薦此亡靈往生極樂國焚香供養冥府第八宫無上正度真君世人所謂平等大王其中罪人手抱銅柱身卧鐵牀死經百日方到此宫罪業大深拘留此獄天尊大慈哀憫衆生濟度罪魂而作偈頌無量太華天尊冥官鼓筆怒威驚拷掠悲辛不忍聞人世百年無片善亡靈過惡似沙塵隂關未隔陽光界骨肉為誰救拔人惟願脫離幽鎖去得生恭敬大慈尊和不可思議功德爾時真人聞是頌巳禮謝天尊再吟偈頌隨願往生天尊虛皇一念向衆生地獄咸聽大法音倐忽超升三界土永離幽夜劒林中和願薦此亡靈往生極樂國焚香供養冥府第九宫飛魔演化真君世人所謂都市大王其中地獄鋸解鑊湯萬死千生無有休息死經周歲方詣此宫天尊布化普為衆生大啓慈悲救苦度厄而作偈頌玉虛明皇天尊冥關一閉永無光溟漠幽昏去路長浮世何由通信息酆都境界隔隂陽危冠朱吏司刑剎獄卒牛頭掌鑊湯稽首慈尊來救苦願乘超度入仙鄉和不可思議功德爾時真人聞是頌巳歡喜讃嘆功德無邊稽首天尊再吟偈頌乘功託化天尊天尊法力不思議一切天神願賴依白簡真符來地獄威光前路引魂儀和願薦此亡靈往生極樂國焚香供養冥府第十宫五靈威德真君見世名曰轉輪大王應諸罪魂死經大祥方至此宫天尊憫濟救拔亡靈而為偈頌真皇洞神天尊虛皇演教説真詮普為衆生度有緣行滿登髙無色界罪根深重入冥泉逍遙宴處金華館纍劫應知見福田一切幽魂咸解脫盡披重霧覩青天和不可思議功德爾時真人聞是頌巳讃嘆無量再吟偈頌寶華圎滿天尊天尊哀憫救群迷九夜幽魂盡出離徑上南宫咸受度普皆同會入無為和願薦此亡靈往生極樂國天尊言一切衆生死經地獄魂繫酆都備受諸苦時時拷掠刀山屠割銅柱鐵牀火翳寒池無邊苦惱吾今為汝稱吟寶偈舉無量音響徹十方聲聞九地拷對悉皆解脫魂神受錬徑上南宫劫劫生生長居快樂向來演説天尊偈頌十王真君名號功德圎成超度亡過某人往生天界伏願承兹妙果盡釋愆尤速離幽暗之鄉徑達往生之路然冀福流見在慶及家門一切有情同登道岸諷經宣疏向來回向地府十王拔度儀終
