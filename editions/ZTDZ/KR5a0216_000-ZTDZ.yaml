front:
  text: 地府十王㧞度儀爲八
  hash: sha256:ed156eb5c8b48c97f628236a4b017dd7fcb55b85a58dcf8ad13f9ea9edf030e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0216_SJB_000-030596a, image: sjb/03/030596a.png}
body:
  text: 法事普獻無邊聖香煙散大羅諸天無量聖日月斗星辰玄師經籙祖天府衆髙眞願垂大慈力超度此亡靈和不可思議功德普獻無邊聖香煙透冥關酆都岱嶽府考校罪魂司幽牢遍諸獄地府衆威靈願垂大慈力超度此亡靈和不可思議功德普獻無邊聖香煙遍榑桑江河淮海濟雷電雨龍神十洲三島谷水府衆仙眞願垂大慈力超度此亡靈和不可思議功德啓聖入科伏以天髙地下布品彚以昭彰日往月來成四時之代謝有生必盡無始不終覩山澤之難藏知形數之不免皇天有監造物無私生雖貴賤之殊死無髙下之間人生一世幻化非堅假合形軀强成四體似枕前之春夢如石中之火光似猛風之徹燭如水上之浮漚變滅須㬰之間成壤俄頃之際形歸於地魄返諸幽惟彼至人超於妙外行乎萬人之上坐閱古人之徒千載歸來嘆城郭之猶是一朝頓悟雖宇宙之難籠苟非自得其方難免同歸於土今齋官某伏爲亡過某恐縁在世之時身有無邊之罪歸依眞教大啓琅函恭對髙眞稱揚聖號大聖三寳天尊爾時元始天尊在西那玉國鬱絶之山長樂宫中黃金殿内與太上道君演教世界衆生死經十大地獄因縁罪福報對無休敕妙行眞人承此光明下入九幽普㧞亡靈悉令超度以今懴悔說此善縁各啓虔誠同聲讃詠信禮無上大羅天三清三境三寳天尊三尊聖號功德無邊可以超度亡靈可以保扶見在今亡過某追修冥路早遂超昇先請五分冥香供養三清上聖降臨道場次請大德法師行持法事仰憑法衆齊聲讃嘆大不可思議道香德香無爲香解脫香自然微妙返生香香冉冉珮玲玲唯聞法師讃嘆聲寳藴一開天地靜逡巡早見異光生一炷冥香𤑔返魂望空供養玉晨尊願降大慈無礙力使令亡者早超昇和不可思議功德焚香仰啓法中王清微天中爲聖主生天生地生人物髙上玉清元始尊和不可思議功德焚香仰啓法中王禹餘天中爲教主傳經傳教傳萬法髙上玉晨大道君和不可思議功德焚香仰啓法中王太赤天中爲化主造化三才運五行髙上五靈玄老君和不可思議功德爾時元始天尊告妙行眞人曰北方溟海之外十萬餘里有一世界名曰洞隂朔單鬱絶之國中有一帝君號曰五靈玄老黒帝天君統領北郷無鞅聖衆有一大山號曰酆都山上接閬風之臺週迴五萬餘里下有六洞謂之曰隂景天宫即太溟水帝北隂天君酆都大帝之所治也諸天直使五斗靈君東斗生炁君南斗司禁君西斗生形君北斗司命君中斗緫録君九合土主五嶽大神以爲僚屬分司佐治十位眞君諸大地獄校量善惡拷掠魂神應是亡殁之人遍須經詣是時坐中有一眞人名曰妙行瞻依天尊作諸是頌㧞度亡人今日敷揚用伸懴念太一救苦天尊焚香供養冥府第一宫泰素妙廣眞君世人所謂秦廣大王其中地獄長蛇吐焰鐵狗噴煙亡人一七先到此宫天尊哀憫救度亡魂出離冥塗迺稱偈讃玉寳皇上天尊茫茫苦海實堪哀惡業於身手自㘽魂魄巳歸司命府幽關鎖閉幾時開長蛇吐焰炎如火鐵狗噴煙陣陣來稽首諦聽三寳頌普令超度出泉臺和不可思議功德爾時眞人聞是頌巳懽喜踴躍仰謝天尊再稱偈讃九幽㧞罪天尊無邊聖力不思議盡釋幽牢拷對詞一道祥光來接引亡靈隨逐上丹墀和願薦此亡靈往生極樂國焚香供養冥府第二宫隂德定休眞君見世名曰初江大王其中地獄刀山劒樹火翳寒冰亡人二七須詣此宫天尊哀憫㧞度亡魂出離冥塗迺稱偈讃玄眞萬福天尊衆生成造惡因縁孰爲回心見福田劒樹刀山屠一體湯隨烈火恣烹煎無明種種欺方寸一念思惟秪罪愆汝等歸依無上道當來速得往生天和不可思議功德爾時眞人聞是頌巳心大懽喜稽首天尊再吟偈讃十方救苦天尊悠悠長夜可悲傷一切衆生苦莫當仰頼慈尊垂救度須㬰熱惱化清涼和願薦此亡靈往生極樂國焚香供養冥府第三宫洞明普靜眞君世人所謂宋帝大王其中地獄呑火食毒屠割身形亡人三七須詣此宫天尊大慈不令經渉迺作偈頌太妙至極天尊冥冥幽府九重根長夜唯聞苦毒聲獄卒强教呑毒炭牛頭屠割汝形身前生業果重重積殁後悲酸一一經今日聽宣無上道此身速離廣寒庭和不可思議功德爾時眞人聞是頌巳說大慈心讃嘆天尊而作偈頌朱陵度命天尊天尊說教大慈悲惡業衆生盡得離五色祥光開道路從今同㑹入無爲和願薦此亡靈往生極樂國焚香供養第四宫玄德五靈眞君世人所謂仵官大王其中地獄負沙運石無有休息亡人四七須詣此宫天尊大慈廣垂哀憫救度衆生而作偈頌玄上玉晨天尊酆都六洞大冥郷窈窕窮魂實可傷惡業沉魂歸地府善功圎滿上天堂負沙運石無休息滚滚長河似沸湯諦聽慈悲無上語今爲甘露入飢腸和不可思議功德爾時眞人聞是頌巳稽首天尊讃嘆無量再吟偈頌法橋大度天尊天尊無量救衆生白簡丹書地獄迎一切愆尤俱解釋從今拷掠頓超昇和不可思議功德焚香供養冥府第五宫最聖耀靈眞君世人所謂閻羅大王乃北隂天君之上佐諸大地獄之緫司號同九幽位齊五斗亡人五七當至此宫業鏡現形隨縁報對天尊慈憫普爲衆生㧞度亡魂而作偈頌度仙上聖天尊衆生顚倒昧元因慾海茫茫錯用心金玉如山難濟死臨行惟有業隨身三塗渺渺無超度長夜冥冥正拷魂地獄須㬰皆解脫一心恭敬大慈尊和不可思議功德爾時眞人聞是慈悲稽首作禮上白天尊再吟偈頌火錬丹界天尊衆生業障本由心解脫須憑無量因稽首虚皇無上道一言寳偈勝千金和願薦此亡靈往生極樂國焚香供養冥府第六宫寳肅昭成眞君世人所謂變成大王其中地獄金釘㧞舌鐵斧刳胷亡人六七當詣此宫晝夜拷魂被受諸苦天尊慈憫奉爲一切窮魂而作偈頌好生度命天尊刀山劒樹鐵成林惡業衆生正苦吟浮世電光來快樂冥塗千劫永湮沉隂司報對無容隱㧞舌刳胷痛莫禁爲汝滅除無量業當來稽首謝三清和不可思議功德爾時眞人聞是頌巳頂禮恭敬上白天尊再吟偈頌金闕化身天尊慈尊惠度說因縁接引衆生上法船錬度此形成妙質當知聖力大無邊和願薦此亡靈往生極樂國焚香供養冥府第七宫泰山玄妙眞君見世名曰泰山大王受上帝敕命佐理北隂晝居東嶽夜入冥府亡人終七須詣此宫拷定因縁校量罪福天尊救度普使超昇爲諸衆生而作偈頌太靈虚皇天尊人間禍福本無門汝等親㘽善惡根方寸但知藏垢穢百年數盡作孤魂業風吹處生還死萬劫悲辛不忍聞爲汝滅除無量業當來來敬大元君和不可思議功德爾時眞人聞是妙音發無上道心稽首天尊再吟偈頌逍遙快樂天尊悠悠五苦報囚徒髙上慈尊盡㧞扶倐忽遍䝉甘露洒幽關無數出泥塗和願薦此亡靈往生極樂國焚香供養冥府第八宫無上正度眞君世人所謂平等大王其中罪人手抱銅柱身卧鐵牀死經百日方到此宫罪業大深拘留此獄天尊大慈哀憫衆生濟度罪魂而作偈頌無量太華天尊冥官鼓筆怒威驚拷掠悲辛不忍聞人世百年無片善亡靈過惡似沙塵隂關未隔陽光界骨肉爲誰救㧞人惟願脫離幽鎖去得生恭敬大慈尊和不可思議功德爾時眞人聞是頌巳禮謝天尊再吟偈頌隨願往生天尊虚皇一念向衆生地獄咸聽大法音倐忽超昇三界土永離幽夜劒林中和願薦此亡靈往生極樂國焚香供養冥府第九宫飛魔演化眞君世人所謂都市大王其中地獄鋸解鑊湯萬死千生無有休息死經周歳方詣此宫天尊布化普爲衆生大啓慈悲救苦度厄而作偈頌玉虚明皇天尊冥關一閉永無光溟漠幽昏去路長浮世何由通信息酆都境界隔隂陽危冠朱吏司刑刹獄卒牛頭掌鑊湯稽首慈尊來救苦願乗超度入仙郷和不可思議功德爾時眞人聞是頌巳懽喜讃嘆功德無邊稽首天尊再吟偈頌乗功託化天尊天尊法力不思議一切天神願頼依白簡眞符來地獄威光前路引魂儀和願薦此亡靈往生極樂國焚香供養冥府第十宫五靈威德眞君見世名曰轉輪大王應諸罪魂死經大祥方至此宫天尊憫濟救㧞亡靈而爲偈頌眞皇洞神天尊虚皇演教說眞詮普爲衆生度有縁行滿登髙無色界罪根深重入冥泉逍遙宴處金華館累劫應知見福田一切幽魂咸解脫盡披重霧覩青天和不可思議功德爾時眞人聞是頌巳讃嘆無量再吟偈頌寳華圎滿天尊天尊哀憫救群迷九夜幽魂盡出離徑上南宫咸受度普皆同㑹入無爲和願薦此亡靈往生極樂國天尊言一切衆生死經地獄魂繫酆都備受諸苦時時拷掠刀山屠割銅柱鐵牀火翳寒池無邊苦惱吾今爲汝稱吟寳偈舉無量音響徹十方聲聞九地拷對悉皆解脫魂神受錬徑上南宫劫劫生生長居快樂向來演說天尊偈頌十王眞君名號功德圎成超度亡過某人往生天界伏願承兹妙果盡釋愆尤速離幽暗之郷徑達往生之路然冀福流見在慶及家門一切有情同登道岸諷經宣䟽向來回向地府十王㧞度儀終
